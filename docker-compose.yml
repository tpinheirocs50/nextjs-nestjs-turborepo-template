services:
  postgres:
    image: postgres:17-alpine
    container_name: monorepo_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: monorepo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    container_name: monorepo_migrate
    profiles: ["full"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/monorepo
    working_dir: /workspace/apps/api
    entrypoint: ["sh", "-c"]
    command:
      - |
        pnpm exec prisma migrate deploy

  api:
    image: nextjs-nestjs-turborepo-template-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: monorepo_api
    restart: unless-stopped
    profiles: ["full"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      LOG_LEVEL: info
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/monorepo
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-development-secret-at-least-32-characters-long}
      BETTER_AUTH_URL: http://localhost:3001
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}

  web:
    image: nextjs-nestjs-turborepo-template-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-development-secret-at-least-32-characters-long}
    container_name: monorepo_web
    restart: unless-stopped
    profiles: ["full"]
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
      INTERNAL_API_URL: http://api:3001
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-development-secret-at-least-32-characters-long}

volumes:
  postgres_data: